<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RutasFácil | Registro de Cliente</title>

<style>
:root{
    --verde:#10493D;
    --verde2:#16614F;
    --naranja:#FF6B35;
    --fondo:#F4F6F5;
    --borde:#D8DED9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:var(--fondo);
}

header{
    background:var(--verde);
    color:white;
    padding:20px 30px;
}

header h1{
    font-size:24px;
}

header p{
    margin-top:5px;
}

main{
    max-width:600px;
    margin:35px auto;
}

.tarjeta{
    background:white;
    border-radius:10px;
    padding:25px;
    border:1px solid var(--borde);
}

.tarjeta h2{
    color:var(--verde);
    border-bottom:3px solid var(--naranja);
    display:inline-block;
    padding-bottom:5px;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid var(--borde);
    border-radius:6px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:var(--verde2);
}

button{
    margin-top:25px;
    width:100%;
    padding:13px;
    border:none;
    background:var(--naranja);
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#e65a28;
}

.error{
    color:red;
    font-size:12px;
}
</style>

</head>

<body>

<header>

<h1>RutasFácil</h1>

<p>Paso 1 de 3 (33%) - Registro del Cliente</p>

</header>

<main>

<div class="tarjeta">

<h2>Datos del Cliente</h2>

<form action="destino.html">

<label>Nombres</label>

<input
type="text"
required
placeholder="Ingrese sus nombres">

<label>Apellidos</label>

<input
type="text"
required
placeholder="Ingrese sus apellidos">

<label>Correo electrónico</label>

<input
type="email"
required
placeholder="ejemplo@gmail.com">

<label>Teléfono</label>

<input
type="tel"
required
pattern="09[0-9]{8}"
maxlength="10"
placeholder="0987654321">

<button type="submit">

Siguiente →

</button>

</form>

</div>

</main>

</body>
</html>
