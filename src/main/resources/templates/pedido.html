<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RutasFacil - Nuevo Pedido</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root {
            --color-primary: #0066cc;
            --color-primary-dark: #004999;
            --color-success: #18a957;
            --color-warning: #ff6b35;
            --color-light: #f2f2f2;
            --color-white: #ffffff;
            --color-text: #333333;
            --color-border: #d9e2ef;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font-family);
            background: var(--color-light);
            color: var(--color-text);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .page-header {
            background: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
        }
        .page-header h1 {
            margin-bottom: 6px;
            font-size: 24px;
        }
        .page-header p {
            color: #666;
            font-size: 14px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .card {
            background: var(--color-white);
            border-radius: 16px;
            border: 1px solid var(--color-border);
            padding: 24px;
            box-shadow: 0 14px 35px rgba(0,0,0,0.06);
        }
        .card h2 {
            margin-bottom: 18px;
            color: var(--color-primary);
            font-size: 20px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            color: #444;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #d2dae8;
            font-size: 14px;
            background: #fff;
            font-family: var(--font-family);
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        input[readonly] {
            background: #f2f5fb;
        }
        .map-box {
            min-height: 260px;
            border-radius: 16px;
            overflow: hidden;
            background: #f2f5fb;
            margin-bottom: 16px;
        }
        .info-box {
            background: #eef5ff;
            border-radius: 12px;
            padding: 14px;
            color: #374151;
            font-size: 14px;
            margin-bottom: 18px;
        }
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.2s ease;
            padding: 14px 20px;
        }
        .btn-primary {
            background: var(--color-primary);
            color: var(--color-white);
        }
        .btn-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #f5f7fb;
            color: var(--color-text);
            border: 1px solid #d2dae8;
        }
        .btn-secondary:hover {
            background: #e8eef8;
        }
        .route-result {
            background: #f5faf5;
            border: 1px solid #d8eed8;
            border-radius: 14px;
            padding: 18px;
            min-height: 140px;
            line-height: 1.7;
            font-size: 15px;
            color: #333;
        }
        .full-width {
            grid-column: span 2;
        }
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div>
                <h1>RutasFacil</h1>
                <p>Registrar entrega con origen, destino y ruta óptima.</p>
            </div>
            <button class="btn btn-secondary" onclick="volverPanel()">← Volver al panel</button>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Datos del paquete</h2>
                <div class="form-group">
                    <label for="tipoPaquete">Tipo de paquete</label>
                    <select id="tipoPaquete"><option>Cargando...</option></select>
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Caja con documentos"></textarea>
                </div>
                <div class="form-group">
                    <label for="peso">Peso (kg)</label>
                    <input id="peso" type="number" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Dimensiones (cm)</label>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
                        <input id="alto" type="number" placeholder="Alto">
                        <input id="ancho" type="number" placeholder="Ancho">
                        <input id="largo" type="number" placeholder="Largo">
                    </div>
                </div>
                <div class="form-group">
                    <label for="valorDeclarado">Valor declarado (USD)</label>
                    <input id="valorDeclarado" type="number" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="observaciones">Observaciones</label>
                    <textarea id="observaciones" placeholder="Instrucciones adicionales"></textarea>
                </div>
            </div>

            <div class="card">
                <h2>Origen</h2>
                <div class="map-box" id="mapaOrigen"></div>
                <div class="info-box" id="estadoOrigen">Seleccione origen en el mapa</div>
                <div class="form-group">
                    <label for="direccionOrigen">Dirección automática</label>
                    <input id="direccionOrigen" readonly>
                </div>
                <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <input id="latitudOrigen" readonly placeholder="Latitud">
                    <input id="longitudOrigen" readonly placeholder="Longitud">
                </div>
                <button class="btn btn-primary" onclick="usarUbicacion('origen')">Usar ubicación actual</button>
            </div>

            <div class="card">
                <h2>Destino</h2>
                <div class="map-box" id="mapaDestino"></div>
                <div class="info-box" id="estadoDestino">Seleccione destino en el mapa</div>
                <div class="form-group">
                    <label for="direccionDestino">Dirección automática</label>
                    <input id="direccionDestino" readonly>
                </div>
                <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <input id="latitudDestino" readonly placeholder="Latitud">
                    <input id="longitudDestino" readonly placeholder="Longitud">
                </div>
                <button class="btn btn-primary" onclick="usarUbicacion('destino')">Usar ubicación actual</button>
            </div>

            <div class="card full-width">
                <h2>Ruta óptima</h2>
                <div id="resultadoRuta" class="route-result">Seleccione origen y destino y presione <strong>Calcular ruta óptima</strong>.</div>
                <div style="margin-top:20px;display:flex;flex-wrap:wrap;gap:12px;">
                    <button class="btn btn-secondary" onclick="calcularRuta()">Calcular ruta óptima</button>
                    <button class="btn btn-primary" onclick="guardarPedido()">Registrar entrega</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const API_BASE = "";
        const centroEcuador = [-1.8312, -78.1834];
        let mapaOrigen, mapaDestino, marcadorOrigen, marcadorDestino;
        let ciudades = [];
        let ciudadOrigenId = null;
        let ciudadDestinoId = null;
        let rutaSeleccionada = null;

        function volverPanel() {
            window.location.href = "/panel";
        }

        function crearMapa(id, tipo) {
            const mapa = L.map(id).setView(centroEcuador, 7);
            L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "OpenStreetMap" }).addTo(mapa);
            const marcador = L.marker(centroEcuador, { draggable: true }).addTo(mapa);
            marcador.on("dragend", () => seleccionarUbicacion(tipo, marcador.getLatLng()));
            mapa.on("click", (e) => {
                marcador.setLatLng(e.latlng);
                seleccionarUbicacion(tipo, e.latlng);
            });
            if (tipo === "origen") {
                mapaOrigen = mapa;
                marcadorOrigen = marcador;
            } else {
                mapaDestino = mapa;
                marcadorDestino = marcador;
            }
        }

        function actualizarEstado(tipo, mensaje) {
            document.getElementById(tipo === "origen" ? "estadoOrigen" : "estadoDestino").textContent = mensaje;
        }

        async function obtenerDireccion(lat, lng, campo) {
            try {
                const respuesta = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const datos = await respuesta.json();
                document.getElementById(campo).value = datos.display_name || "Dirección no encontrada";
            } catch (error) {
                document.getElementById(campo).value = "Dirección no disponible";
            }
        }

        function seleccionarUbicacion(tipo, latlng) {
            const lat = latlng.lat;
            const lng = latlng.lng;
            const sufijo = tipo === "origen" ? "Origen" : "Destino";
            document.getElementById(`latitud${sufijo}`).value = lat.toFixed(6);
            document.getElementById(`longitud${sufijo}`).value = lng.toFixed(6);
            actualizarEstado(tipo, `${tipo === "origen" ? "Origen" : "Destino"} seleccionado`);
            obtenerDireccion(lat, lng, `direccion${sufijo}`);
        }

        function usarUbicacion(tipo) {
            if (!navigator.geolocation) {
                alert("El navegador no soporta ubicación");
                return;
            }
            navigator.geolocation.getCurrentPosition((pos) => {
                const punto = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                if (tipo === "origen") {
                    mapaOrigen.setView(punto, 15);
                    marcadorOrigen.setLatLng(punto);
                } else {
                    mapaDestino.setView(punto, 15);
                    marcadorDestino.setLatLng(punto);
                }
                seleccionarUbicacion(tipo, punto);
            }, () => alert("No se pudo obtener ubicación"));
        }

        async function cargarTipos() {
            const respuesta = await fetch(`${API_BASE}/tipos-paquete`);
            const tipos = await respuesta.json();
            const select = document.getElementById("tipoPaquete");
            select.innerHTML = "";
            tipos.forEach((t) => {
                const opcion = document.createElement("option");
                opcion.value = t.id;
                opcion.textContent = t.nombre;
                select.appendChild(opcion);
            });
        }

        async function cargarCiudades() {
            const respuesta = await fetch(`${API_BASE}/ciudades`);
            ciudades = await respuesta.json();
        }

        function buscarCiudad(lat, lng) {
            let mejor = null;
            let menor = Number.MAX_VALUE;
            ciudades.forEach((c) => {
                const dLat = lat - Number(c.latitud);
                const dLng = lng - Number(c.longitud);
                const distancia = dLat * dLat + dLng * dLng;
                if (distancia < menor) {
                    menor = distancia;
                    mejor = c;
                }
            });
            return mejor;
        }

        async function calcularRuta() {
            const latO = Number(document.getElementById("latitudOrigen").value);
            const lngO = Number(document.getElementById("longitudOrigen").value);
            const latD = Number(document.getElementById("latitudDestino").value);
            const lngD = Number(document.getElementById("longitudDestino").value);
            if (!latO || !lngO || !latD || !lngD) {
                alert("Seleccione origen y destino en el mapa");
                return;
            }
            const origen = buscarCiudad(latO, lngO);
            const destino = buscarCiudad(latD, lngD);
            if (!origen || !destino) {
                alert("No se encontraron ciudades cercanas");
                return;
            }
            ciudadOrigenId = origen.id;
            ciudadDestinoId = destino.id;
            try {
                const respuesta = await fetch(`${API_BASE}/rutas/optima/${origen.id}/${destino.id}`);
                if (!respuesta.ok) throw new Error("No existe ruta");
                rutaSeleccionada = await respuesta.json();
                document.getElementById("resultadoRuta").innerHTML = `
                    <strong>Ruta encontrada</strong><br><br>
                    <strong>Recorrido:</strong> ${rutaSeleccionada.ciudadesRecorridas.join(" → ")}<br>
                    <strong>Distancia:</strong> ${rutaSeleccionada.distanciaTotal} km
                `;
            } catch (error) {
                console.error(error);
                document.getElementById("resultadoRuta").textContent = "❌ No existe una ruta registrada";
            }
        }

        async function guardarPedido() {
            const usuario = JSON.parse(localStorage.getItem("usuario"));
            if (!usuario || !usuario.cliente) {
                alert("Inicie sesión nuevamente");
                window.location.href = "/login";
                return;
            }
            if (!ciudadOrigenId || !ciudadDestinoId) {
                await calcularRuta();
            }
            if (!rutaSeleccionada) {
                alert("Debe calcular una ruta antes de registrar");
                return;
            }
            const entrega = {
                cliente: { id: Number(usuario.cliente.id) },
                ciudadOrigen: { id: Number(ciudadOrigenId) },
                ciudadDestino: { id: Number(ciudadDestinoId) },
                tipoPaquete: { id: Number(document.getElementById("tipoPaquete").value) },
                direccionOrigen: document.getElementById("direccionOrigen").value,
                direccionDestino: document.getElementById("direccionDestino").value,
                latitudOrigen: Number(document.getElementById("latitudOrigen").value),
                longitudOrigen: Number(document.getElementById("longitudOrigen").value),
                latitudDestino: Number(document.getElementById("latitudDestino").value),
                longitudDestino: Number(document.getElementById("longitudDestino").value),
                descripcion: document.getElementById("descripcion").value,
                peso: Number(document.getElementById("peso").value),
                alto: Number(document.getElementById("alto").value),
                ancho: Number(document.getElementById("ancho").value),
                largo: Number(document.getElementById("largo").value),
                valorDeclarado: Number(document.getElementById("valorDeclarado").value),
                observaciones: document.getElementById("observaciones").value
            };
            try {
                const respuesta = await fetch(`${API_BASE}/entregas`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(entrega)
                });
                if (!respuesta.ok) {
                    const errorText = await respuesta.text();
                    console.error(errorText);
                    throw new Error("Error al registrar pedido");
                }
                const pedido = await respuesta.json();
                alert(`Pedido creado correctamente. Guía: ${pedido.numeroGuia || "generada"}`);
                window.location.href = "/panel";
            } catch (error) {
                console.error(error);
                alert("No se pudo registrar la entrega");
            }
        }

        window.addEventListener("DOMContentLoaded", async () => {
            crearMapa("mapaOrigen", "origen");
            crearMapa("mapaDestino", "destino");
            await Promise.all([cargarTipos(), cargarCiudades()]);
        });
    </script>
</body>
</html>
