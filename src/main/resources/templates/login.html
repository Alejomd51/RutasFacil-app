<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RutasFacil</title>
    <style>
        :root {
            --color-primary: #0066cc;
            --color-primary-dark: #004999;
            --color-success: #18a957;
            --color-error: #d32f2f;
            --color-light: #f2f2f2;
            --color-white: #ffffff;
            --color-text: #333333;
            --spacing-base: 10px;
            --border-radius: 10px;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--color-light) 0%, #e5e5e5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-base);
        }

        .login-container {
            background: var(--color-white);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: var(--color-primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 6px;
            font-size: 13px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: var(--font-family);
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #999;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background: var(--color-primary-dark);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        .registro-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .registro-section p {
            color: #666;
            font-size: 14px;
        }

        .registro-section a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .registro-section a:hover {
            color: var(--color-primary-dark);
            text-decoration: underline;
        }

        .error-message {
            display: none;
            background: #ffebee;
            color: var(--color-error);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            border-left: 4px solid var(--color-error);
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>RutasFacil</h1>
            <p>Gestor de entregas inteligente</p>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input 
                    type="text"
                    id="username"
                    placeholder="Ingrese su usuario"
                    required
                    aria-label="Usuario">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Ingrese su contraseña"
                    required
                    aria-label="Contraseña">
            </div>

            <button type="submit">Ingresar</button>
        </form>

        <div class="registro-section">
            <p>¿No tienes cuenta? <a href="/registro">Regístrate aquí</a></p>
        </div>
    </div>

    <script>
        const API_BASE = '';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Limpiar mensaje de error
            errorMsg.classList.remove('show');
            errorMsg.textContent = '';

            // Validaciones
            if (!username) {
                mostrarError('Por favor ingresa tu usuario');
                return;
            }

            if (!password) {
                mostrarError('Por favor ingresa tu contraseña');
                return;
            }

            if (username === 'admin' && password === '220704') {
                const adminUser = {
                    username: 'admin',
                    rol: 'ADMIN'
                };
                localStorage.setItem('usuario', JSON.stringify(adminUser));
                window.location.href = '/admin';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    mostrarError('Error de conexión. Intenta de nuevo.');
                    return;
                }

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    const redirectPath = data.usuario.rol === 'ADMIN' ? '/admin' : '/panel';
                    window.location.href = redirectPath;
                } else {
                    mostrarError(data.message || 'Credenciales inválidas');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarError('Error al conectar con el servidor');
            }
        });

        function mostrarError(mensaje) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = mensaje;
            errorMsg.classList.add('show');
        }

        // Limpiar formulario si viene de una redirección
        window.addEventListener('pageshow', () => {
            const usuario = localStorage.getItem('usuario');
            if (usuario) {
                // Si ya hay una sesión, redirigir al panel
                window.location.href = '/panel';
            }
        });
    </script>
</body>
</html>
