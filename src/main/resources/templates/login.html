<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - RutasFacil</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login {
            background:white;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 10px #aaa;
        }

        input, button {
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing:border-box;
        }

        button {
            background:#0066cc;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover {
            background:#004999;
        }

        h2 {
            text-align:center;
        }

    </style>

</head>


<body>


<div class="login">

<h2>Iniciar Sesión</h2>


<form id="loginForm">


<input 
type="text" 
id="username" 
placeholder="Usuario"
required>


<input 
type="password" 
id="password" 
placeholder="Contraseña"
required>


<button type="submit">
Ingresar
</button>


</form>


</div>



<script>


document.getElementById("loginForm")
.addEventListener("submit", function(e){


    e.preventDefault();


    let username =
    document.getElementById("username").value;


    let password =
    document.getElementById("password").value;



    fetch("http://localhost:8081/usuarios/" + username)


    .then(res => {


        if(!res.ok){

            throw new Error("Usuario no encontrado");

        }


        return res.json();

    })


    .then(usuario => {



        if(usuario.password === password){



            alert("Bienvenido " + usuario.cliente.nombres);



            localStorage.setItem(
                "usuario",
                JSON.stringify(usuario)
            );



            window.location.href="/panel";



        }else{


            alert("Contraseña incorrecta");


        }



    })


    .catch(error => {


        alert(error.message);


    });



});


</script>


</body>

</html>
