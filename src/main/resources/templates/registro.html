<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - RutasFacil</title>
    <style>
        :root {
            --color-primary: #0066cc;
            --color-primary-dark: #004999;
            --color-success: #18a957;
            --color-error: #d32f2f;
            --color-warning: #ff6b35;
            --color-light: #f2f2f2;
            --color-white: #ffffff;
            --color-text: #333333;
            --spacing-base: 10px;
            --border-radius: 10px;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--color-light) 0%, #e5e5e5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-base);
        }

        .registro-container {
            background: var(--color-white);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .registro-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .registro-header h1 {
            color: var(--color-primary);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .registro-header p {
            color: #666;
            font-size: 14px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section-title {
            font-size: 12px;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 6px;
            font-size: 13px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: var(--font-family);
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: #999;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: var(--color-primary);
            color: var(--color-white);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background: var(--color-primary-dark);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        .mensaje {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            display: none;
        }

        .mensaje.success {
            display: block;
            background: #e8f5e9;
            color: var(--color-success);
            border-left: 4px solid var(--color-success);
        }

        .mensaje.error {
            display: block;
            background: #ffebee;
            color: var(--color-error);
            border-left: 4px solid var(--color-error);
        }

        .login-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .login-section p {
            color: #666;
            font-size: 14px;
        }

        .login-section a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-section a:hover {
            color: var(--color-primary-dark);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .registro-container {
                padding: 30px 20px;
            }

            .registro-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="registro-container">
        <div class="registro-header">
            <h1>RutasFacil</h1>
            <p>Crea tu cuenta para comenzar</p>
        </div>

        <div id="mensaje" class="mensaje"></div>

        <form id="registroForm">
            <div class="form-section">
                <div class="form-section-title">Datos Personales</div>

                <div class="form-group">
                    <label for="nombres">Nombres</label>
                    <input
                        type="text"
                        id="nombres"
                        placeholder="Juan"
                        required
                        aria-label="Nombres">
                </div>

                <div class="form-group">
                    <label for="apellidos">Apellidos</label>
                    <input
                        type="text"
                        id="apellidos"
                        placeholder="Pérez García"
                        required
                        aria-label="Apellidos">
                </div>

                <div class="form-group">
                    <label for="cedula">Cédula</label>
                    <input
                        type="text"
                        id="cedula"
                        placeholder="1234567890"
                        required
                        aria-label="Cédula">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="tu.correo@ejemplo.com"
                        required
                        aria-label="Correo Electrónico">
                </div>

                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input
                        type="text"
                        id="telefono"
                        placeholder="+593 9 XXXXXXXX"
                        required
                        aria-label="Teléfono">
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Credenciales de Acceso</div>

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        placeholder="mi_usuario"
                        required
                        aria-label="Usuario">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Mínimo 6 caracteres"
                        required
                        minlength="6"
                        aria-label="Contraseña">
                </div>
            </div>

            <button type="submit">Registrarse</button>
        </form>

        <div class="login-section">
            <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script>
        const API_BASE = '';

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const datos = {
                nombres: document.getElementById('nombres').value.trim(),
                apellidos: document.getElementById('apellidos').value.trim(),
                cedula: document.getElementById('cedula').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value
            };

            const mensajeDiv = document.getElementById('mensaje');

            // Validaciones
            if (!datos.nombres) {
                mostrarMensaje('Los nombres son requeridos', 'error');
                return;
            }

            if (!datos.apellidos) {
                mostrarMensaje('Los apellidos son requeridos', 'error');
                return;
            }

            if (!datos.cedula || datos.cedula.length < 9) {
                mostrarMensaje('Ingresa una cédula válida', 'error');
                return;
            }

            if (!datos.email || !datos.email.includes('@')) {
                mostrarMensaje('Ingresa un correo electrónico válido', 'error');
                return;
            }

            if (!datos.telefono) {
                mostrarMensaje('El teléfono es requerido', 'error');
                return;
            }

            if (!datos.username || datos.username.length < 3) {
                mostrarMensaje('El usuario debe tener al menos 3 caracteres', 'error');
                return;
            }

            if (datos.password.length < 6) {
                mostrarMensaje('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/registro`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datos)
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error);
                }

                const resultado = await response.json();

                mostrarMensaje('✓ Registro exitoso. Redirigiendo al login...', 'success');

                // Redirigir al login después de 2 segundos
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                const mensaje = error.message.includes('usuario') 
                    ? 'El usuario ya existe' 
                    : error.message.includes('cédula')
                    ? 'La cédula ya está registrada'
                    : 'Error al registrar. Intenta de nuevo.';
                mostrarMensaje(mensaje, 'error');
            }
        });

        function mostrarMensaje(texto, tipo) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.textContent = texto;
            mensajeDiv.className = `mensaje ${tipo}`;
        }
    </script>
</body>
</html>
