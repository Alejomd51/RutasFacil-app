<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Administrador RutasFacil
</title>


<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}


.panel{

background:white;
padding:25px;
border-radius:10px;
max-width:900px;
margin:auto;

}


.pedido{

background:#eee;
padding:15px;
margin:15px 0;
border-radius:8px;

}


button{

padding:8px;
background:#0066cc;
color:white;
border:0;
cursor:pointer;

}


select{

padding:8px;

}


</style>


</head>


<body>


<div class="panel">

<h2>
Panel Administrador
</h2>


<div id="lista"></div>


</div>



<script>


function cargarPedidos(){


fetch("http://localhost:8081/admin/entregas")

.then(res=>res.json())

.then(data=>{


let html="";


data.forEach(p=>{


html+=`

<div class="pedido">


<h3>
Pedido ${p.numeroGuia}
</h3>


<p>
Cliente:
${p.cliente.nombres}
${p.cliente.apellidos}
</p>


<p>
Origen:
${p.ciudadOrigen.nombre}
</p>


<p>
Destino:
${p.ciudadDestino.nombre}
</p>


<p>
Estado actual:
<b>${p.estado}</b>
</p>



<select id="estado${p.id}">

<option>REGISTRADA</option>

<option>ASIGNADA</option>

<option>EN RUTA</option>

<option>ENTREGADA</option>

</select>


<button onclick="cambiarEstado(${p.id})">

Actualizar

</button>


</div>


`;


});


document.getElementById("lista").innerHTML=html;


});


}



function cambiarEstado(id){


let estado=document.getElementById("estado"+id).value;



fetch(
`http://localhost:8081/admin/entregas/${id}/estado?estado=${estado}`,
{
method:"PUT"
}
)


.then(()=>{

alert("Estado actualizado");

cargarPedidos();

});


}




cargarPedidos();


</script>


</body>

</html>
